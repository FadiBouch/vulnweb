name: Pipeline DevSecOps (Cours)
on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]

jobs:
    check-secrets:
        runs-on: ubuntu-latest
        steps:
        - name: Récupération du code
          uses: actions/checkout@v4
          with:
            fetch-depth: 0 # Nécessaire pour scanner l'historique git
            # On utilise l'action officielle qui correspond à la commande "docker run
            # trufflesecurity/trufflehog"

        - name: Scan des Secrets (TruffleHog)
          uses: trufflesecurity/trufflehog@main
          with:
            extra_args: --only-verified

    check-quality:
      runs-on: ubuntu-latest
      steps:
      - name: Récupération du code
        uses: actions/checkout@v4
      - name: Linter PHP (PHP_CodeSniffer)
        run: |
            docker run --rm -v "$(pwd)/src":/data cytopia/phpcs --standard=PSR12 .

    sast-analysis:
      needs: [check-secrets, check-quality] # On attend que la qualité soit OK
      runs-on: ubuntu-latest
      container:
        image: returntocorp/semgrep
      steps:
      - name: Récupération du code
        uses: actions/checkout@v4
        # Commande adaptée (semgrep scan --config=p/php)
      - name: Scan SAST (Semgrep)
        run: semgrep scan --config=p/php --error --verbose

    sca-analysis:
      runs-on: ubuntu-latest
      steps:
      - name: Récupération du code
        uses: actions/checkout@v4
      # AJOUT : Génération du composer.lock à la volée
      - name: Installation des dépendances (Génération du Lock file)
        run: docker run --rm -v "$PWD/src":/app composer install --ignore-platform-reqs
      - name: Scan SCA (Trivy FS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './src' 
          format: 'table'
          severity: 'CRITICAL,HIGH'


    infra-analysis:
      runs-on: ubuntu-latest
      steps:
      - name: Récupération du code
        uses: actions/checkout@v4
      # Il faut d'abord construire l'image pour pouvoir la scanner
      - name: Build de l'image Docker
        run: docker build -t devops-web:latest ./src
      # Scan de l'image construite
      - name: Scan Infrastructure (Trivy Image)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'devops-web:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'