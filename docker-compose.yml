services:
  web:
    container_name: devsecops-web
    env_file: .env
    volumes:
        - ./src:/var/www/html
    build: ./src
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - devsecops_net

  db:
    container_name: devsecops-bdd
    env_file: .env
    image: mariadb:10.5
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - devsecops_net

  adminer:
    container_name: devsecops-adminer
    image: adminer
    restart: always
    ports:
      - "8081:8080"
    networks:
      - devsecops_net

networks:
  devsecops_net:
    driver: bridge
